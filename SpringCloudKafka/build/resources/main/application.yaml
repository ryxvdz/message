server:
  port: 8081

spring:
  application:
    name: SpringCloudKafka

  cloud:
    function:
      definition: fraudTransactionConsumer

    stream:
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          fraudTransactionConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-name: transacao-topic.dlq

      bindings:
        fraudTransactionConsumer-in-0:
          destination: transacao-topic
          group: fraud-group
          consumer:
            max-attempts: 1